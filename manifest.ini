[ABOUT]
NAME = VRC FA25 DRS Rules
AUTHOR = VRC tooling
VERSION = 2.0
DESCRIPTION = Enforces the real-F1 1-second DRS rule using the FIA timing-loop model: the gap to the car ahead is sampled the instant a car crosses the DRS detection line (time interval over the same point) and latched for the zone(s) that detection feeds. Denies DRS cooperatively via the CSP physics API (physics.allowCarDRS makes DRS unavailable so the car's own script closes the wing); never forces DRS open, never touches authorised cars or cars outside zones. Options: apply to AI/Player/All, lapped-car grant (FIA default on), leader-never-DRS, first DRS lap, race-only. Read-only w.r.t. car/track files -> league-safe. Needs track surfaces.ini [_SCRIPTING_PHYSICS] ALLOW_APPS=1.

